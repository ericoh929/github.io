<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {%- if page.title -%}{{ page.title }} · {{ site.title }}{%- else -%}{{ site.title }}{%- endif -%}
    </title>
    <meta name="description" content="{{ site.description | default: site.title }}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="title-row">
          <div class="site-title">
            <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
          </div>
          <nav class="nav">
            <a href="#about">About</a>
            <a href="#news">News</a>
            <a href="#publications">Publications</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
          </nav>
        </div>
      </header>

      <main class="main">
        {{ content }}
      </main>

      <footer class="footer">
        <div class="muted">
          © {{ 'now' | date: '%Y' }} {{ site.title }} · Built with GitHub Pages
        </div>
      </footer>
    </div>
  </body>
</html>
