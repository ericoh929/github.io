title: "Your Name"
description: "LLM Researcher"

# GitHub Pages 기본 Jekyll 환경에서 안전하게 동작하도록 최소 설정만 사용합니다.
markdown: kramdown
kramdown:
  input: GFM

# 유저 페이지(<username>.github.io)라면 baseurl: "" 를 권장합니다.
# 프로젝트 페이지(<username>.github.io/<repo>)라면 baseurl: "/<repo>" 로 바꾸세요.
baseurl: ""
url: ""

permalink: pretty

defaults:
  - scope:
      path: ""
    values:
      layout: default

